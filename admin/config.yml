backend:
  name: git-gateway
  branch: main

local_backend: false
media_folder: "uploads"
public_folder: "/uploads"

collections:
  - name: "site"
    label: "Contenu du site"
    files:
      - file: "content/site.json"
        name: "site"
        label: "Page complète Vision Foot Académie"
        format: "json"
        fields:
          - label: "Identité et coordonnées"
            name: "identity"
            widget: "object"
            collapsed: false
            fields:
              - { label: "Nom du site", name: "siteName", widget: "string" }
              - { label: "Slogan court", name: "tagline", widget: "string" }
              - { label: "Email", name: "email", widget: "string" }
              - label: "Téléphones"
                name: "phones"
                widget: "list"
                field: { label: "Numéro", name: "phone", widget: "string" }
              - { label: "Numéro WhatsApp international", name: "whatsapp", widget: "string" }
              - { label: "Adresse", name: "address", widget: "text" }
              - { label: "Texte bouton menu", name: "navCta", widget: "string" }

          - label: "Accueil"
            name: "home"
            widget: "object"
            collapsed: false
            fields:
              - { label: "Accroche jaune", name: "heroKicker", widget: "string" }
              - { label: "Grand titre", name: "heroTitle", widget: "text" }
              - { label: "Texte principal", name: "heroText", widget: "text" }
              - { label: "Bouton principal", name: "heroPrimaryText", widget: "string" }
              - { label: "Lien bouton principal", name: "heroPrimaryLink", widget: "string" }
              - { label: "Bouton secondaire", name: "heroSecondaryText", widget: "string" }
              - { label: "Lien bouton secondaire", name: "heroSecondaryLink", widget: "string" }
              - label: "Chiffres clés"
                name: "stats"
                widget: "list"
                fields:
                  - { label: "Valeur", name: "value", widget: "string" }
                  - { label: "Texte", name: "text", widget: "string" }

          - label: "Offres"
            name: "offers"
            widget: "object"
            fields:
              - { label: "Accroche", name: "servicesKicker", widget: "string" }
              - { label: "Titre", name: "servicesTitle", widget: "text" }
              - { label: "Texte", name: "servicesText", widget: "text" }
              - label: "Cartes offres"
                name: "services"
                widget: "list"
                fields:
                  - { label: "Étiquette", name: "tag", widget: "string" }
                  - { label: "Titre", name: "title", widget: "string" }
                  - { label: "Texte", name: "text", widget: "text" }
                  - { label: "Image", name: "image", widget: "image", required: false }
                  - { label: "Texte image", name: "alt", widget: "string", required: false }
                  - { label: "Lien au clic", name: "link", widget: "string", required: false, hint: "Exemples : #stages, #entrainements ou #tournois" }

          - label: "Qui sommes-nous ?"
            name: "aboutBlock"
            widget: "object"
            fields:
              - { label: "Accroche", name: "aboutKicker", widget: "string" }
              - { label: "Titre", name: "aboutTitle", widget: "text" }
              - { label: "Texte de présentation", name: "aboutText", widget: "text" }
              - label: "Points forts"
                name: "aboutPoints"
                widget: "list"
                fields:
                  - { label: "Titre", name: "title", widget: "string" }
                  - { label: "Texte", name: "text", widget: "text" }
              - label: "Photos et vidéos de présentation"
                name: "aboutMedia"
                widget: "list"
                summary: "{{type}} - {{title}}"
                fields:
                  - { label: "Type", name: "type", widget: "select", options: ["Photo", "Vidéo"], default: "Photo" }
                  - { label: "Titre", name: "title", widget: "string" }
                  - { label: "Texte", name: "text", widget: "string", required: false }
                  - { label: "Image ou couverture", name: "image", widget: "image", required: false }
                  - { label: "Lien vidéo ou média", name: "mediaUrl", widget: "string", required: false, hint: "Pour une vidéo, colle un lien YouTube/Vimeo ou un fichier vidéo." }

          - label: "Entraînements"
            name: "training"
            widget: "object"
            fields:
              - { label: "Accroche", name: "trainingKicker", widget: "string" }
              - { label: "Titre", name: "trainingTitle", widget: "text" }
              - { label: "Texte", name: "trainingText", widget: "text" }
              - { label: "Image", name: "trainingImage", widget: "image", required: false }
              - label: "Points clés"
                name: "trainingItems"
                widget: "list"
                field: { label: "Point", name: "item", widget: "string" }

          - label: "Stages et tarifs"
            name: "stages"
            widget: "object"
            fields:
              - { label: "Accroche", name: "stagesKicker", widget: "string" }
              - { label: "Titre", name: "stagesTitle", widget: "text" }
              - { label: "Texte", name: "stagesText", widget: "text" }
              - label: "Cartes stages / tarifs"
                name: "programs"
                widget: "list"
                fields:
                  - { label: "Étiquette", name: "tag", widget: "string" }
                  - { label: "Titre", name: "title", widget: "string" }
                  - { label: "Texte", name: "text", widget: "text" }
                  - { label: "Prix", name: "price", widget: "string" }
                  - { label: "Détail prix", name: "detail", widget: "string" }
                  - { label: "Mettre en avant", name: "highlight", widget: "boolean", default: false }
                  - label: "Avantages"
                    name: "bullets"
                    widget: "list"
                    field: { label: "Avantage", name: "bullet", widget: "string" }
              - { label: "Titre formulaire stage", name: "stageFormTitle", widget: "string" }
              - { label: "Titre bloc gauche stage", name: "stageFormIntroTitle", widget: "string" }
              - { label: "Titre infos stage", name: "stageInfoTitle", widget: "string" }
              - label: "Infos rapides stage"
                name: "stageInfoItems"
                widget: "list"
                field: { label: "Info", name: "item", widget: "string" }
              - { label: "Message WhatsApp stage", name: "stageWhatsAppText", widget: "string" }

          - label: "Valeurs"
            name: "valuesBlock"
            widget: "object"
            fields:
              - label: "Cartes valeurs"
                name: "values"
                widget: "list"
                fields:
                  - { label: "Titre", name: "title", widget: "string" }
                  - { label: "Texte", name: "text", widget: "text" }

          - label: "Tournois"
            name: "tournamentsBlock"
            widget: "object"
            fields:
              - { label: "Accroche", name: "tournamentsKicker", widget: "string" }
              - { label: "Titre", name: "tournamentsTitle", widget: "text" }
              - { label: "Texte", name: "tournamentsText", widget: "text" }
              - label: "Tournois"
                name: "tournaments"
                widget: "list"
                fields:
                  - { label: "Jour", name: "day", widget: "string" }
                  - { label: "Mois", name: "month", widget: "string" }
                  - { label: "Nom", name: "title", widget: "string" }
                  - { label: "Description", name: "text", widget: "text" }
              - { label: "Phrase bouton tournoi", name: "tournamentCta", widget: "string" }
              - { label: "Texte bouton tournoi", name: "tournamentButton", widget: "string" }
              - { label: "Titre formulaire tournoi", name: "tournamentFormTitle", widget: "text" }
              - { label: "Texte formulaire tournoi", name: "tournamentFormText", widget: "text" }

          - label: "Galerie"
            name: "galleryBlock"
            widget: "object"
            fields:
              - { label: "Accroche", name: "galleryKicker", widget: "string" }
              - { label: "Titre", name: "galleryTitle", widget: "text" }
              - { label: "Texte", name: "galleryIntro", widget: "text" }
              - label: "Photos et vidéos à faire défiler"
                name: "galleryItems"
                widget: "list"
                summary: "{{type}} - {{title}}"
                fields:
                  - { label: "Type", name: "type", widget: "select", options: ["Photo", "Vidéo"] }
                  - { label: "Titre", name: "title", widget: "string" }
                  - { label: "Texte", name: "text", widget: "string", required: false }
                  - { label: "Image", name: "image", widget: "image", required: false }
                  - { label: "Lien vidéo ou média à ouvrir", name: "mediaUrl", widget: "string", required: false, hint: "Pour une vidéo, colle un lien YouTube/Vimeo ou sélectionne un fichier vidéo. Si ce champ est vide, la photo s'ouvrira en grand." }
                  - label: "Médias dans cet album"
                    name: "albumItems"
                    widget: "list"
                    required: false
                    summary: "{{type}} - {{title}}"
                    hint: "Ajoute ici plusieurs photos ou vidéos pour cette carte. Si tu laisses vide, la carte ouvrira seulement l'image principale."
                    fields:
                      - { label: "Type", name: "type", widget: "select", options: ["Photo", "Vidéo"], default: "Photo" }
                      - { label: "Titre", name: "title", widget: "string", required: false }
                      - { label: "Texte", name: "text", widget: "string", required: false }
                      - { label: "Image ou couverture", name: "image", widget: "image", required: false }
                      - { label: "Lien vidéo ou média", name: "mediaUrl", widget: "string", required: false }
                  - { label: "Grande carte", name: "large", widget: "boolean", default: false }

          - label: "Actualités"
            name: "newsBlock"
            widget: "object"
            fields:
              - { label: "Accroche", name: "newsKicker", widget: "string" }
              - { label: "Titre", name: "newsTitle", widget: "text" }
              - { label: "Texte", name: "newsIntro", widget: "text" }
              - label: "Actualités"
                name: "news"
                widget: "list"
                fields:
                  - { label: "Étiquette", name: "tag", widget: "string" }
                  - { label: "Titre", name: "title", widget: "string" }
                  - { label: "Texte", name: "text", widget: "text" }
                  - { label: "Image", name: "image", widget: "image", required: false }

          - label: "Réseaux sociaux"
            name: "socialBlock"
            widget: "object"
            fields:
              - { label: "Accroche", name: "socialKicker", widget: "string" }
              - { label: "Titre", name: "socialTitle", widget: "text" }
              - { label: "Texte", name: "socialIntro", widget: "text" }
              - { label: "Lien Facebook", name: "facebookUrl", widget: "string", required: false }
              - { label: "Texte Facebook", name: "facebookText", widget: "string" }
              - { label: "Lien Instagram", name: "instagramUrl", widget: "string", required: false }
              - { label: "Texte Instagram", name: "instagramText", widget: "string" }
              - { label: "Lien TikTok", name: "tiktokUrl", widget: "string", required: false }
              - { label: "Texte TikTok", name: "tiktokText", widget: "string" }

          - label: "Sponsors"
            name: "sponsorsBlock"
            widget: "object"
            fields:
              - { label: "Accroche", name: "sponsorsKicker", widget: "string" }
              - { label: "Titre", name: "sponsorsTitle", widget: "text" }
              - { label: "Texte commercial", name: "sponsorsText", widget: "text" }
              - label: "Logos sponsors"
                name: "sponsors"
                widget: "list"
                fields:
                  - { label: "Nom", name: "name", widget: "string" }
                  - { label: "Logo", name: "image", widget: "image", required: false }

          - label: "Contact et bas de page"
            name: "contactBlock"
            widget: "object"
            fields:
              - { label: "Accroche contact", name: "contactKicker", widget: "string" }
              - { label: "Titre contact", name: "contactTitle", widget: "text" }
              - { label: "Texte contact", name: "contactText", widget: "text" }
              - { label: "Titre disponibilité", name: "availabilityTitle", widget: "string" }
              - { label: "Texte disponibilité", name: "availabilityText", widget: "text" }
              - { label: "Texte bouton WhatsApp", name: "whatsappButton", widget: "string" }
              - { label: "Message WhatsApp", name: "whatsappMessage", widget: "string" }
              - { label: "Bas de page gauche", name: "footerLeft", widget: "string" }
              - { label: "Bas de page droite", name: "footerRight", widget: "string" }
